<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ページ編集 | 8つ森レンタル</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; }

/* ── Top bar ── */
#ed-top {
  height: 50px; background: #0f172a;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; padding: 0 14px; gap: 8px;
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
}
.top-back { color: rgba(255,255,255,.4); text-decoration: none; font-size: 20px; padding: 4px 8px; border-radius: 6px; transition: all .15s; line-height: 1; }
.top-back:hover { color: #fff; background: rgba(255,255,255,.08); }
.top-label { font-size: 13px; font-weight: 700; color: #fff; padding-left: 10px; border-left: 1px solid rgba(255,255,255,.1); white-space: nowrap; }
.top-div { width: 1px; height: 22px; background: rgba(255,255,255,.1); flex-shrink: 0; margin: 0 2px; }
.top-space { flex: 1; }
.icon-btn { border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,.45); padding: 6px 8px; border-radius: 6px; font-size: 16px; line-height: 1; transition: all .15s; }
.icon-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
.icon-btn:disabled { opacity: .25; cursor: not-allowed; }
.dev-toggle { display: flex; background: rgba(255,255,255,.07); border-radius: 20px; padding: 2px; }
.dev-toggle button { border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,.4); padding: 4px 14px; border-radius: 18px; font-size: 12px; font-weight: 600; transition: all .18s; }
.dev-toggle button.active { background: #fff; color: #0f172a; }
#ed-status { font-size: 11px; color: rgba(255,255,255,.3); white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
#preview-btn { border: 1px solid rgba(255,255,255,.15); background: transparent; color: rgba(255,255,255,.7); cursor: pointer; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; transition: all .15s; }
#preview-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
#publish-btn { background: #2563eb; color: #fff; border: none; cursor: pointer; padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; transition: all .18s; white-space: nowrap; }
#publish-btn:hover:not(:disabled) { background: #1d4ed8; }
#publish-btn:disabled { background: #334155; color: #64748b; cursor: default; }
#publish-btn.done { background: #059669; }

/* ── Layout ── */
#ed-body { display: flex; height: calc(100vh - 50px); margin-top: 50px; }

/* ── Left sidebar ── */
#ed-left { width: 220px; flex-shrink: 0; background: #1e293b; border-right: 1px solid rgba(255,255,255,.07); display: flex; flex-direction: column; }
.left-head { padding: 12px 14px 8px; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: rgba(255,255,255,.3); text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
#section-list { flex: 1; overflow-y: auto; padding: 8px; }
.sec-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: rgba(255,255,255,.6); font-size: 12px; transition: all .15s; margin-bottom: 2px; }
.sec-item:hover { background: rgba(255,255,255,.07); color: #fff; }
.sec-item.active { background: rgba(59,130,246,.2); color: #93c5fd; }
.sec-icon { font-size: 14px; flex-shrink: 0; }
.left-hint { padding: 10px 14px; font-size: 11px; color: rgba(255,255,255,.2); line-height: 1.6; border-top: 1px solid rgba(255,255,255,.07); }

/* ── Canvas ── */
#ed-canvas { flex: 1; min-width: 0; background: #1e293b; display: flex; flex-direction: column; align-items: center; overflow: hidden; position: relative; }
#canvas-scroller { flex: 1; width: 100%; overflow: auto; display: flex; justify-content: center; padding: 24px; }
#canvas-wrapper { width: 100%; max-width: 1280px; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.5); background: #fff; transition: max-width .3s ease; position: relative; }
#page-iframe { width: 100%; border: none; display: block; min-height: 600px; }

/* Loading overlay */
#canvas-loading { position: absolute; inset: 0; background: #1e293b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: rgba(255,255,255,.4); font-size: 13px; z-index: 10; border-radius: 8px; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Right sidebar ── */
#ed-right { width: 260px; flex-shrink: 0; background: #1e293b; border-left: 1px solid rgba(255,255,255,.07); display: flex; flex-direction: column; }
.right-head { padding: 12px 14px 8px; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: rgba(255,255,255,.3); text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
#props-panel { flex: 1; overflow-y: auto; padding: 12px; }
#no-sel { text-align: center; padding: 32px 12px; color: rgba(255,255,255,.2); font-size: 12px; line-height: 1.8; }
#no-sel .no-sel-icon { font-size: 28px; margin-bottom: 8px; }
.prop-group { margin-bottom: 16px; }
.prop-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: rgba(255,255,255,.35); text-transform: uppercase; margin-bottom: 6px; }
.format-btns { display: flex; gap: 4px; }
.format-btns button { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all .15s; }
.format-btns button:hover { background: rgba(255,255,255,.14); color: #fff; }
.prop-row { display: flex; align-items: center; gap: 8px; }
.prop-input { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; }
.prop-input:focus { outline: none; border-color: #3b82f6; }
.prop-input[type="color"] { padding: 2px 4px; height: 34px; cursor: pointer; width: 50px; }
.prop-input[type="number"] { width: 80px; }
.prop-unit { color: rgba(255,255,255,.4); font-size: 12px; }
.btn-replace { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.8); padding: 8px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; width: 100%; transition: all .15s; text-align: left; }
.btn-replace:hover { background: rgba(59,130,246,.2); border-color: rgba(59,130,246,.5); color: #93c5fd; }
.btn-replace:disabled { opacity: .5; cursor: default; }
.img-preview { width: 100%; max-height: 120px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,.1); }
.sel-tag { display: inline-block; background: rgba(59,130,246,.15); color: #93c5fd; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-bottom: 10px; }

/* ── Toast ── */
#ed-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1e293b; color: #e2e8f0; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 24px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: all .22s; border-left: 3px solid #3b82f6; white-space: nowrap; z-index: 10000; }
#ed-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#ed-toast.success { border-left-color: #10b981; }
#ed-toast.error { border-left-color: #ef4444; color: #fca5a5; background: #1a0a0a; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="ed-top">
  <a class="top-back" href="index.html" title="ダッシュボードに戻る">‹</a>
  <span class="top-label">8つ森レンタル — ページ編集</span>
  <div class="top-div"></div>
  <button class="icon-btn" id="undo-btn" title="元に戻す (Ctrl+Z)" disabled>↩</button>
  <button class="icon-btn" id="redo-btn" title="やり直す (Ctrl+Y)" disabled>↪</button>
  <div class="top-space"></div>
  <div class="dev-toggle">
    <button id="dev-desktop" class="active">🖥 PC</button>
    <button id="dev-mobile">📱 スマホ</button>
  </div>
  <div class="top-space"></div>
  <span id="ed-status"></span>
  <button id="preview-btn">👁 プレビュー</button>
  <button id="publish-btn">✓ 保存して公開</button>
</div>

<div id="ed-toast"></div>

<div id="ed-body">

  <!-- Left: section list -->
  <div id="ed-left">
    <div class="left-head">ページ構成</div>
    <div id="section-list"></div>
    <div class="left-hint">クリックで編集<br>テキスト → 直接入力<br>画像 → クリックで差し替え</div>
  </div>

  <!-- Canvas -->
  <div id="ed-canvas">
    <div id="canvas-scroller">
      <div id="canvas-wrapper">
        <div id="canvas-loading">
          <div class="loading-spinner"></div>
          ページを読み込み中...
        </div>
        <iframe id="page-iframe" title="編集中のページ" scrolling="yes"></iframe>
      </div>
    </div>
  </div>

  <!-- Right: properties -->
  <div id="ed-right">
    <div class="right-head">プロパティ</div>
    <div id="props-panel">

      <!-- Nothing selected -->
      <div id="no-sel">
        <div class="no-sel-icon">👆</div>
        ページ内の<br>テキストや画像を<br>クリックして編集
      </div>

      <!-- Text props -->
      <div id="text-props" style="display:none">
        <div class="sel-tag" id="sel-tag">テキスト</div>
        <div class="prop-group">
          <div class="prop-label">書式</div>
          <div class="format-btns">
            <button data-cmd="bold"><b>B</b></button>
            <button data-cmd="italic"><i>I</i></button>
            <button data-cmd="underline"><u>U</u></button>
          </div>
        </div>
        <div class="prop-group">
          <div class="prop-label">フォントサイズ</div>
          <div class="prop-row">
            <input type="number" id="font-size-inp" class="prop-input" min="8" max="200" step="1">
            <span class="prop-unit">px</span>
          </div>
        </div>
        <div class="prop-group">
          <div class="prop-label">文字色</div>
          <div class="prop-row">
            <input type="color" id="text-color-inp" class="prop-input">
            <span id="text-color-val" style="font-size:11px;color:rgba(255,255,255,.4)"></span>
          </div>
        </div>
        <div class="prop-group">
          <div class="prop-label">太さ</div>
          <select id="font-weight-inp" class="prop-input">
            <option value="400">通常</option>
            <option value="600">セミボールド</option>
            <option value="700">ボールド</option>
            <option value="900">エクストラボールド</option>
          </select>
        </div>
      </div>

      <!-- Image props -->
      <div id="image-props" style="display:none">
        <div class="sel-tag">画像</div>
        <div class="prop-group">
          <img id="img-preview" class="img-preview" src="" alt="" style="display:none">
          <button class="btn-replace" id="replace-img-btn">🖼 画像を変更する</button>
          <input type="file" id="img-file-inp" accept="image/*" style="display:none">
        </div>
        <div class="prop-group">
          <div class="prop-label">幅</div>
          <div class="prop-row">
            <input type="number" id="img-width-inp" class="prop-input" min="10" max="2000" step="1">
            <span class="prop-unit">px</span>
          </div>
        </div>
        <div class="prop-group">
          <div class="prop-label">代替テキスト (alt)</div>
          <input type="text" id="alt-inp" class="prop-input" placeholder="画像の説明">
        </div>
      </div>

    </div>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/adminClient.js?v=6"></script>
<script src="js/adminAuth.js?v=6"></script>
<script src="js/editorClient.js?v=1"></script>
<script>
// ================================================================
// 8つ森レンタル ページエディタ — Phase 1
// GrapesJSなし・ライブiframe直接編集方式
// ================================================================

// ── State ──
let iframeDoc = null;
let iframeWin = null;
let selectedEl = null;
let activeTextEl = null;
let activeImgEl = null;
let isDirty = false;
let undoStack = [];
let redoStack = [];

// ── Toast ──
let toastTimer;
function toast(msg, type = "info") {
  const el = document.getElementById("ed-toast");
  el.textContent = msg;
  el.className = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ""; }, 3200);
}
function setStatus(msg) { document.getElementById("ed-status").textContent = msg; }

// ── Undo / Redo ──
function snapshotForUndo() {
  if (!iframeDoc) return;
  const root = iframeDoc.getElementById("page-root") || iframeDoc.body;
  const snap = { html: root.innerHTML };
  undoStack.push(snap);
  if (undoStack.length > 60) undoStack.shift();
  redoStack = [];
  isDirty = true;
  refreshUndoButtons();
}

function refreshUndoButtons() {
  document.getElementById("undo-btn").disabled = undoStack.length <= 1;
  document.getElementById("redo-btn").disabled = redoStack.length === 0;
}

function applySnapshot(snap) {
  const root = iframeDoc.getElementById("page-root") || iframeDoc.body;
  root.innerHTML = snap.html;
  reattach();
}

function doUndo() {
  if (undoStack.length <= 1) return;
  const cur = undoStack.pop();
  redoStack.push(cur);
  applySnapshot(undoStack[undoStack.length - 1]);
  refreshUndoButtons();
}

function doRedo() {
  if (!redoStack.length) return;
  const snap = redoStack.pop();
  undoStack.push(snap);
  applySnapshot(snap);
  refreshUndoButtons();
}

document.getElementById("undo-btn").addEventListener("click", doUndo);
document.getElementById("redo-btn").addEventListener("click", doRedo);

// ── Load iframe ──
const iframe = document.getElementById("page-iframe");

// Auto-resize iframe height to content
function resizeIframe() {
  if (!iframeDoc) return;
  try {
    const h = iframeDoc.documentElement.scrollHeight;
    iframe.style.height = Math.max(h, 600) + "px";
  } catch(e) {}
}

iframe.addEventListener("load", () => {
  iframeDoc = iframe.contentDocument;
  iframeWin = iframe.contentWindow;

  // Disable pageRenderer to avoid overwriting while editing
  if (iframeWin.YATSUMORI_EDITOR_MODE !== undefined) return;
  Object.defineProperty(iframeWin, "YATSUMORI_EDITOR_MODE", { value: true });

  // Wait for any dynamic content to settle
  setTimeout(() => {
    document.getElementById("canvas-loading").style.display = "none";
    resizeIframe();
    injectEditingCSS();
    attachEditHandlers();
    buildSectionList();
    injectSortable();

    // Initial undo snapshot
    const root = iframeDoc.getElementById("page-root") || iframeDoc.body;
    undoStack = [{ html: root.innerHTML }];
    refreshUndoButtons();

    // Load last published time
    loadPublishedPage().then(p => {
      if (p?.updated_at) {
        const d = new Date(p.updated_at);
        setStatus("最終公開 " + d.toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" }));
      } else {
        setStatus("まだ公開されていません");
      }
    }).catch(() => {});

  }, 800);
});

iframe.src = "../index.html";

// ── CSS injected into iframe ──
function injectEditingCSS() {
  const old = iframeDoc.getElementById("_ed_style");
  if (old) old.remove();
  const style = iframeDoc.createElement("style");
  style.id = "_ed_style";
  style.textContent = `
    [data-ed]:hover:not([contenteditable="true"]) {
      outline: 2px solid rgba(59,130,246,.65) !important;
      outline-offset: 2px !important;
      cursor: pointer !important;
    }
    [data-ed].ed-sel {
      outline: 2px solid #3b82f6 !important;
      outline-offset: 2px !important;
    }
    [data-ed][contenteditable="true"] {
      outline: 2px solid #f59e0b !important;
      outline-offset: 2px !important;
      cursor: text !important;
    }
    [data-ed-img] { position: relative !important; cursor: pointer !important; }
    [data-ed-img]:hover::after {
      content: "🖼 クリックして変更" !important;
      position: absolute !important; top: 50% !important; left: 50% !important;
      transform: translate(-50%,-50%) !important;
      background: rgba(0,0,0,.72) !important; color: #fff !important;
      padding: 6px 14px !important; border-radius: 6px !important;
      font-size: 12px !important; white-space: nowrap !important; z-index: 9999 !important;
    }
    /* Section drag handle */
    ._ed_sec { position: relative !important; }
    ._ed_handle { position: absolute !important; left: 8px !important; top: 8px !important;
      width: 28px !important; height: 28px !important;
      background: #3b82f6 !important; color: #fff !important;
      border-radius: 6px !important; display: flex !important; align-items: center !important;
      justify-content: center !important; font-size: 14px !important;
      cursor: grab !important; z-index: 9999 !important; opacity: 0 !important;
      transition: opacity .15s !important; user-select: none !important; }
    ._ed_sec:hover > ._ed_handle { opacity: 1 !important; }
    ._ed_handle:active { cursor: grabbing !important; }
    .sortable-ghost { opacity: .35 !important; }
    .sortable-chosen ._ed_handle { opacity: 1 !important; }
  `;
  iframeDoc.head.appendChild(style);
}

// ── Attach edit handlers ──
const TEXT_SEL = [
  "h1","h2","h3","h4","h5","p",
  ".hero-title",".hero-text",".hero-desc",
  ".badge-title",".badge-sub",
  ".booking-card-title",".booking-step-label",
  ".content-card-title",".content-card-desc",
  ".review-text",".review-stars",
  ".footer-info-row",
  ".recommend-title",".recommend-sub",
  ".pill-btn",".footer-action-btn",
  "a.btn",
].join(",");

function attachEditHandlers() {
  if (!iframeDoc) return;

  // Text
  iframeDoc.querySelectorAll(TEXT_SEL).forEach(el => {
    if (el.closest("[data-ed-img]")) return;
    el.setAttribute("data-ed", "text");
    el._ed_handler = el._ed_handler || ((e) => { e.stopPropagation(); handleTextClick(el); });
    el.removeEventListener("click", el._ed_handler);
    el.addEventListener("click", el._ed_handler);
  });

  // Images
  iframeDoc.querySelectorAll("img").forEach(el => {
    el.setAttribute("data-ed-img", "");
    el._ed_img_handler = el._ed_img_handler || ((e) => { e.preventDefault(); e.stopPropagation(); handleImgClick(el); });
    el.removeEventListener("click", el._ed_img_handler);
    el.addEventListener("click", el._ed_img_handler);
  });

  // Click elsewhere to deselect
  iframeDoc.addEventListener("click", (e) => {
    if (!e.target.hasAttribute("data-ed") && !e.target.hasAttribute("data-ed-img")) deselect();
  }, { capture: false });

  // Escape to deselect
  iframeDoc.addEventListener("keydown", (e) => {
    if (e.key === "Escape") deselect();
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); handlePublish(); }
  });
}

function reattach() {
  injectEditingCSS();
  attachEditHandlers();
  buildSectionList();
  resizeIframe();
}

// ── Text editing ──
function handleTextClick(el) {
  if (activeTextEl && activeTextEl !== el) commitText();
  selectEl(el, "text");

  el.contentEditable = "true";
  el.focus();
  // Place cursor at click position
  activeTextEl = el;
  el._snap = el.innerHTML; // for undo
}

function commitText() {
  if (!activeTextEl) return;
  if (activeTextEl.innerHTML !== activeTextEl._snap) snapshotForUndo();
  activeTextEl.contentEditable = "false";
  activeTextEl.classList.remove("ed-sel");
  activeTextEl = null;
  deselect();
}

// ── Image editing ──
function handleImgClick(el) {
  if (activeTextEl) commitText();
  selectEl(el, "image");
  activeImgEl = el;

  // Update right panel
  const preview = document.getElementById("img-preview");
  preview.src = el.src;
  preview.style.display = "block";
  document.getElementById("alt-inp").value = el.alt || "";
  const w = el.offsetWidth || el.naturalWidth || "";
  document.getElementById("img-width-inp").value = w || "";
}

document.getElementById("replace-img-btn").addEventListener("click", () => {
  document.getElementById("img-file-inp").click();
});

document.getElementById("img-file-inp").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file || !activeImgEl) return;
  const btn = document.getElementById("replace-img-btn");
  btn.disabled = true; btn.textContent = "アップロード中...";
  try {
    snapshotForUndo();
    const url = await uploadSiteAsset(file);
    activeImgEl.src = url;
    document.getElementById("img-preview").src = url;
    resizeIframe();
    toast("画像を変更しました", "success");
  } catch (err) {
    toast("アップロード失敗: " + err.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "🖼 画像を変更する";
    e.target.value = "";
  }
});

document.getElementById("alt-inp").addEventListener("input", (e) => {
  if (activeImgEl) activeImgEl.alt = e.target.value;
});

document.getElementById("img-width-inp").addEventListener("change", (e) => {
  if (!activeImgEl) return;
  snapshotForUndo();
  activeImgEl.style.width = e.target.value + "px";
});

// ── Select / Deselect ──
function selectEl(el, type) {
  if (selectedEl && selectedEl !== el) {
    selectedEl.classList.remove("ed-sel");
  }
  selectedEl = el;
  el.classList.add("ed-sel");

  // Right panel
  document.getElementById("no-sel").style.display = "none";
  document.getElementById("text-props").style.display = type === "text" ? "block" : "none";
  document.getElementById("image-props").style.display = type === "image" ? "block" : "none";

  if (type === "text") syncTextProps(el);
}

function deselect() {
  if (activeTextEl) commitText(); // commitText calls deselect again, guard:
  if (!selectedEl && !activeTextEl && !activeImgEl) return;
  if (selectedEl) { selectedEl.classList.remove("ed-sel"); selectedEl = null; }
  activeImgEl = null;
  document.getElementById("no-sel").style.display = "block";
  document.getElementById("text-props").style.display = "none";
  document.getElementById("image-props").style.display = "none";
}

// ── Text props (right panel) ──
function syncTextProps(el) {
  if (!iframeWin) return;
  const cs = iframeWin.getComputedStyle(el);
  const size = Math.round(parseFloat(cs.fontSize)) || "";
  document.getElementById("font-size-inp").value = size;
  document.getElementById("font-weight-inp").value = cs.fontWeight || "400";

  const hex = rgbToHex(cs.color);
  document.getElementById("text-color-inp").value = hex;
  document.getElementById("text-color-val").textContent = hex;
  document.getElementById("sel-tag").textContent = el.tagName.toLowerCase();
}

function rgbToHex(rgb) {
  const m = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return "#000000";
  return "#" + [m[1],m[2],m[3]].map(x => (+x).toString(16).padStart(2,"0")).join("");
}

// Format buttons (bold/italic/underline)
document.querySelectorAll("[data-cmd]").forEach(btn => {
  btn.addEventListener("mousedown", (e) => {
    e.preventDefault();
    if (!activeTextEl) return;
    activeTextEl.focus();
    iframeDoc.execCommand(btn.dataset.cmd, false, null);
  });
});

document.getElementById("font-size-inp").addEventListener("change", (e) => {
  if (!activeTextEl) return;
  snapshotForUndo();
  activeTextEl.style.fontSize = e.target.value + "px";
  syncTextProps(activeTextEl);
});

document.getElementById("font-weight-inp").addEventListener("change", (e) => {
  if (!activeTextEl) return;
  snapshotForUndo();
  activeTextEl.style.fontWeight = e.target.value;
});

document.getElementById("text-color-inp").addEventListener("input", (e) => {
  if (!activeTextEl) return;
  activeTextEl.style.color = e.target.value;
  document.getElementById("text-color-val").textContent = e.target.value;
  isDirty = true;
});

document.getElementById("text-color-inp").addEventListener("change", () => {
  snapshotForUndo();
});

// ── Section list (left panel) ──
const SEC_MAP = [
  { sel: "header, nav, .site-header",     icon: "🔗", label: "ヘッダー・ナビ" },
  { sel: ".hero, section.hero",            icon: "🏔", label: "ヒーロー" },
  { sel: ".booking-card",                  icon: "📅", label: "予約カード" },
  { sel: ".badges",                        icon: "✓",  label: "特徴バッジ" },
  { sel: ".content-cards, .services",      icon: "🎿", label: "サービスカード" },
  { sel: ".reviews",                       icon: "⭐", label: "お客様の声" },
  { sel: ".recommends, .info-section",     icon: "📍", label: "おすすめ情報" },
  { sel: "footer, .footer-bar",            icon: "📞", label: "フッター" },
];

function buildSectionList() {
  const list = document.getElementById("section-list");
  list.innerHTML = "";
  if (!iframeDoc) return;

  SEC_MAP.forEach(({ sel, icon, label }) => {
    const el = iframeDoc.querySelector(sel);
    if (!el) return;
    const item = document.createElement("div");
    item.className = "sec-item";
    item.innerHTML = `<span class="sec-icon">${icon}</span><span>${label}</span>`;
    item.addEventListener("click", () => {
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll(".sec-item").forEach(i => i.classList.remove("active"));
      item.classList.add("active");
    });
    list.appendChild(item);
  });
}

// ── Section drag-to-reorder (Sortable.js injected into iframe) ──
function injectSortable() {
  if (!iframeDoc) return;

  // Find top-level sections to make sortable
  const root = iframeDoc.getElementById("page-root") || iframeDoc.body;

  // Add handles to direct children that are block elements
  Array.from(root.children).forEach(child => {
    const tag = child.tagName.toLowerCase();
    if (["header","section","div","footer","nav"].includes(tag)) {
      child.classList.add("_ed_sec");
      if (!child.querySelector("._ed_handle")) {
        const handle = iframeDoc.createElement("div");
        handle.className = "_ed_handle";
        handle.title = "ドラッグして並び替え";
        handle.textContent = "⠿";
        child.insertBefore(handle, child.firstChild);
      }
    }
  });

  // Inject Sortable.js into iframe
  const s = iframeDoc.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js";
  s.onload = () => {
    try {
      iframeWin.Sortable.create(root, {
        handle: "._ed_handle",
        animation: 180,
        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        onEnd: () => {
          snapshotForUndo();
          buildSectionList();
          resizeIframe();
          toast("セクションを移動しました", "info");
        },
      });
    } catch (e) {}
  };
  iframeDoc.head.appendChild(s);
}

// ── Device toggle ──
document.getElementById("dev-desktop").addEventListener("click", (e) => {
  document.getElementById("canvas-wrapper").style.maxWidth = "1280px";
  document.querySelectorAll(".dev-toggle button").forEach(b => b.classList.remove("active"));
  e.currentTarget.classList.add("active");
});
document.getElementById("dev-mobile").addEventListener("click", (e) => {
  document.getElementById("canvas-wrapper").style.maxWidth = "430px";
  document.querySelectorAll(".dev-toggle button").forEach(b => b.classList.remove("active"));
  e.currentTarget.classList.add("active");
});

// ── Preview ──
document.getElementById("preview-btn").addEventListener("click", () => {
  window.open("../index.html", "_blank");
});

// ── Publish ──
async function handlePublish() {
  if (activeTextEl) commitText();

  const btn = document.getElementById("publish-btn");
  btn.disabled = true; btn.textContent = "公開中...";

  try {
    const root = iframeDoc.getElementById("page-root") || iframeDoc.body;

    // Clean editor artifacts before saving
    iframeDoc.querySelectorAll("._ed_handle").forEach(h => h.remove());
    iframeDoc.querySelectorAll("[data-ed]").forEach(el => {
      el.removeAttribute("data-ed");
      el.removeAttribute("contenteditable");
      el.classList.remove("ed-sel");
    });
    iframeDoc.querySelectorAll("[data-ed-img]").forEach(el => {
      el.removeAttribute("data-ed-img");
      el.classList.remove("ed-sel");
    });
    iframeDoc.querySelectorAll("._ed_sec").forEach(el => el.classList.remove("_ed_sec"));

    const html = root.innerHTML;

    // Get page CSS (inline style tags)
    const css = Array.from(iframeDoc.querySelectorAll("style:not(#_ed_style)"))
      .map(s => s.textContent).join("\n");

    await publishPage({ html, css, projectData: { savedAt: new Date().toISOString() } });

    isDirty = false;
    const now = new Date().toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
    setStatus("公開済み " + now);
    btn.textContent = "✓ 公開しました";
    btn.classList.add("done");
    toast("公開しました！ライブサイトに反映されました", "success");

    // Re-inject editing after cleanup
    setTimeout(() => {
      reattach();
      injectSortable();
      btn.textContent = "✓ 保存して公開";
      btn.classList.remove("done");
      btn.disabled = false;
    }, 1800);

  } catch (e) {
    toast("公開に失敗しました: " + e.message, "error");
    btn.textContent = "✓ 保存して公開";
    btn.disabled = false;
  }
}

document.getElementById("publish-btn").addEventListener("click", handlePublish);

// ── Keyboard shortcuts ──
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); handlePublish(); }
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === "z") { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.shiftKey && e.key === "z"))) { e.preventDefault(); doRedo(); }
});

// ── Unsaved warning ──
window.addEventListener("beforeunload", (e) => {
  if (isDirty) { e.preventDefault(); e.returnValue = ""; }
});

// ── Boot ──
(async function init() {
  if (!(await requireAdminSession())) return;
  refreshUndoButtons();
})();
</script>
