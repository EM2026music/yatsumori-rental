<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>予約一覧 | 8つ森レンタル 管理</title>
<link rel="stylesheet" href="../assets/css/style.css?v=12">
</head>
<body>
<div class="page">
  <div id="admin-header"></div>
  <div class="container">
    <div id="error-box"></div>

    <div class="inline-form">
      <div class="field">
        <label class="field-label" for="date-filter">日付で絞り込み（空欄＝すべて）</label>
        <input type="date" id="date-filter" class="field-input">
      </div>
      <div class="field">
        <label class="field-label" for="status-filter">状態</label>
        <select id="status-filter" class="field-select">
          <option value="active">受付中・確定のみ</option>
          <option value="all">すべて</option>
          <option value="pending">受付中</option>
          <option value="confirmed">確定</option>
          <option value="cancelled">キャンセル</option>
        </select>
      </div>
      <button class="btn-sm" id="clear-btn" style="padding:12px 16px">クリア</button>
    </div>

    <h3 style="font-size:15px;margin:18px 0 10px" id="list-heading">予約一覧</h3>
    <div id="reservation-list"><p class="empty-note">読み込み中...</p></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/adminClient.js?v=6"></script>
<script src="js/adminAuth.js?v=6"></script>
<script src="../assets/js/booking.js?v=6"></script>
<script>
function showError(msg) {
  document.getElementById("error-box").innerHTML =
    msg ? `<div class="alert alert-error">${msg}</div>` : "";
}

const STATUS_LABEL = { pending: "受付中", confirmed: "確定", cancelled: "キャンセル" };
const BOARD_LABEL = { ski: "スキー", snowboard: "スノーボード" };

function periodText(r) {
  const start = r.rental_date;
  const end = r.return_date || r.rental_date;
  if (start === end) return `${start}（日帰り）`;
  const days = Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
  return `${start} 〜 ${end}（${days}日間）`;
}

async function loadReservations() {
  const listEl = document.getElementById("reservation-list");
  listEl.innerHTML = `<p class="empty-note">読み込み中...</p>`;
  showError("");

  const dateStr = document.getElementById("date-filter").value;
  const statusVal = document.getElementById("status-filter").value;

  let q = sb
    .from("reservations")
    .select("id, reservation_code, rental_date, return_date, customer_name, customer_phone, party_size, adults, children, notes, status, reservation_members(member_no, height_cm, shoe_cm, board_type, is_child), reservation_items(quantity, equipment_items(category, size_label))")
    .order("rental_date", { ascending: false })
    .order("created_at", { ascending: false });

  // 日付で絞り込み：その日が利用期間（開始〜返却）に含まれる予約を表示
  if (dateStr) q = q.lte("rental_date", dateStr).gte("return_date", dateStr);
  if (statusVal === "active") q = q.in("status", ["pending", "confirmed"]);
  else if (statusVal !== "all") q = q.eq("status", statusVal);

  const { data, error } = await q;
  if (error) { showError("読み込みに失敗しました：" + error.message); listEl.innerHTML = ""; return; }
  if (!data || data.length === 0) { listEl.innerHTML = `<p class="empty-note">該当する予約はありません。</p>`; return; }

  document.getElementById("list-heading").textContent = `予約一覧（${data.length}件）`;
  listEl.innerHTML = data.map(renderCard).join("");
  attachActions();
}

function renderCard(r) {
  const members = r.reservation_members || [];
  // 新形式（ウィザード予約）：利用者ごとに身長/靴/種別を表示（道具準備用）
  let detail;
  if (members.length) {
    const rows = members
      .slice()
      .sort((a, b) => a.member_no - b.member_no)
      .map((m) => {
        const who = m.is_child ? "子供" : "大人";
        return `<div class="data-card-meta" style="padding-left:6px">・${who}｜身長 ${m.height_cm}cm｜靴 ${m.shoe_cm}cm｜<b>${BOARD_LABEL[m.board_type] || m.board_type}</b></div>`;
      }).join("");
    detail = `<div class="data-card-meta" style="margin-top:4px;font-weight:700">ご利用者（${members.length}名）</div>${rows}`;
  } else {
    // 旧形式（サイズ選択）フォールバック
    const items = (r.reservation_items || []).map((ri) => {
      const ei = ri.equipment_items || {};
      return `${CATEGORY_LABEL[ei.category] || ei.category || "?"} ${ei.size_label || ""} ×${ri.quantity}`;
    }).join("、") || "—";
    detail = `<div class="data-card-meta">用具: ${items}</div>`;
  }

  const partyText = r.adults != null
    ? `大人${r.adults}名${r.children ? ` / 子供${r.children}名` : ""}`
    : `${r.party_size}名`;

  const actions = r.status === "cancelled" ? "" : `
    <div class="row-actions">
      ${r.status === "pending" ? `<button class="btn-sm solid" data-act="confirm" data-id="${r.id}">確定にする</button>` : ""}
      <button class="btn-sm danger" data-act="cancel" data-id="${r.id}">キャンセル</button>
    </div>`;

  return `
    <div class="data-card">
      <div class="data-card-top">
        <div>
          <div class="data-card-name">${r.customer_name} 様</div>
          <div class="data-card-meta">${periodText(r)}　${partyText}　${r.customer_phone}</div>
        </div>
        <span class="status-badge status-${r.status}">${STATUS_LABEL[r.status]}</span>
      </div>
      <div class="data-card-meta">予約番号: ${r.reservation_code}</div>
      ${detail}
      ${r.notes ? `<div class="data-card-meta">ご要望: ${r.notes}</div>` : ""}
      ${actions}
    </div>`;
}

function attachActions() {
  document.querySelectorAll("[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      if (act === "cancel" && !confirm("この予約をキャンセルしますか？")) return;
      btn.disabled = true;
      const patch = act === "confirm"
        ? { status: "confirmed" }
        : { status: "cancelled", cancelled_at: new Date().toISOString() };
      const { error } = await sb.from("reservations").update(patch).eq("id", id);
      if (error) { showError("更新に失敗しました：" + error.message); btn.disabled = false; return; }
      loadReservations();
    });
  });
}

(async function init() {
  if (!(await requireAdminSession())) return;
  renderAdminChrome("reservations");
  const df = document.getElementById("date-filter");
  df.addEventListener("click", () => { try { df.showPicker(); } catch (e) {} });
  df.addEventListener("change", loadReservations);
  document.getElementById("status-filter").addEventListener("change", loadReservations);
  document.getElementById("clear-btn").addEventListener("click", () => {
    document.getElementById("date-filter").value = "";
    document.getElementById("status-filter").value = "active";
    loadReservations();
  });
  loadReservations();
})();
</script>
</body>
</html>
