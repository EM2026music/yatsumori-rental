<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>WEB予約 | 8つ森レンタル</title>
<link rel="stylesheet" href="assets/css/style.css?v=7">
</head>
<body>
<div class="page">

  <header class="subpage-header">
    <a class="back-link" href="index.html">&#8249;</a>
    <span class="subpage-title">かんたんWEB予約</span>
  </header>

  <div class="container">

    <!-- 進捗バー -->
    <div class="wizard-progress">
      <div class="wp-step active" id="wp1"><div class="wp-circle">1</div><div class="wp-label">日付</div></div>
      <div class="wp-line" id="wl1"></div>
      <div class="wp-step" id="wp2"><div class="wp-circle">2</div><div class="wp-label">人数・用具</div></div>
      <div class="wp-line" id="wl2"></div>
      <div class="wp-step" id="wp3"><div class="wp-circle">3</div><div class="wp-label">完了</div></div>
    </div>

    <div id="error-box"></div>

    <!-- ステップ1: 日付 -->
    <section class="step-panel active" id="step1">
      <div class="field">
        <label class="field-label" for="rental-date">利用日を選ぶ<span class="req">必須</span></label>
        <input type="date" id="rental-date" class="field-input">
        <p class="help-text">空き状況を確認してから人数・用具の選択に進みます。</p>
      </div>
      <div class="wizard-actions">
        <button class="btn-nav primary btn-block" id="to-step2">空き状況を確認する</button>
      </div>
    </section>

    <!-- ステップ2: 人数・用具 -->
    <section class="step-panel" id="step2">
      <div class="field">
        <label class="field-label" for="party-size">ご利用人数<span class="req">必須</span></label>
        <input type="number" id="party-size" class="field-input" min="1" max="20" value="1">
      </div>

      <p class="field-label">ご希望の用具・サイズ<span class="req">必須</span></p>
      <p class="help-text" style="margin-top:0;margin-bottom:14px">選択した日に在庫のあるサイズのみ表示しています。</p>
      <div id="equip-container"></div>

      <div class="field" style="margin-top:8px">
        <label class="field-label" for="cust-name">お名前<span class="req">必須</span></label>
        <input type="text" id="cust-name" class="field-input" placeholder="山田 太郎">
      </div>
      <div class="field">
        <label class="field-label" for="cust-phone">電話番号<span class="req">必須</span></label>
        <input type="tel" id="cust-phone" class="field-input" placeholder="09012345678">
        <p class="help-text">予約の確認・変更の際に必要です。</p>
      </div>
      <div class="field">
        <label class="field-label" for="cust-email">メールアドレス（任意）</label>
        <input type="email" id="cust-email" class="field-input" placeholder="example@email.com">
        <p class="help-text">ご入力いただくと確認メールをお送りします。</p>
      </div>
      <div class="field">
        <label class="field-label" for="cust-notes">ご要望など（任意）</label>
        <input type="text" id="cust-notes" class="field-input" placeholder="ウェアも借りたい 等">
      </div>

      <div class="wizard-actions">
        <button class="btn-nav ghost" id="back-step1">戻る</button>
        <button class="btn-nav primary" id="submit-reservation">この内容で予約する</button>
      </div>
    </section>

    <!-- ステップ3: 完了 -->
    <section class="step-panel" id="step3">
      <div class="done-box">
        <div class="done-check">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 13L9.5 17.5L19 7"/></svg>
        </div>
        <h2 class="done-title">ご予約を受け付けました</h2>
        <p class="done-sub">当日は営業時間内にご来店ください。</p>

        <div class="code-box">
          <p class="code-label">予約番号</p>
          <p class="code-value" id="result-code">YR-XXXXXX</p>
        </div>

        <div class="summary-list" id="result-summary"></div>

        <p class="help-text" id="email-note" style="margin-top:16px"></p>

        <div class="wizard-actions" style="margin-top:22px">
          <a class="btn-nav ghost" href="index.html">トップへ戻る</a>
          <a class="btn-nav primary" href="reserve-lookup.html">予約を確認する</a>
        </div>
      </div>
    </section>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabaseClient.js?v=5"></script>
<script src="assets/js/booking.js?v=5"></script>
<script>
const state = {
  date: null,
  availability: [],   // [{equipment_item_id, category, size_label, remaining}]
  quantities: {},     // equipment_item_id -> qty
};

function showError(msg) {
  document.getElementById("error-box").innerHTML =
    msg ? `<div class="alert alert-error">${msg}</div>` : "";
}

function gotoStep(n) {
  for (let i = 1; i <= 3; i++) {
    document.getElementById("step" + i).classList.toggle("active", i === n);
    const wp = document.getElementById("wp" + i);
    wp.classList.toggle("active", i === n);
    wp.classList.toggle("done", i < n);
  }
  document.getElementById("wl1").classList.toggle("done", n > 1);
  document.getElementById("wl2").classList.toggle("done", n > 2);
  window.scrollTo(0, 0);
}

// ---- ステップ1 -> 2 ----
async function handleToStep2() {
  showError("");
  const dateInput = document.getElementById("rental-date");
  if (!dateInput.value) { showError("利用日を選択してください。"); return; }
  state.date = dateInput.value;

  const btn = document.getElementById("to-step2");
  btn.disabled = true;
  btn.textContent = "確認中...";
  try {
    state.availability = await fetchAvailability(state.date);
    if (state.availability.length === 0) {
      showError("選択した日は予約可能な在庫がありません。別の日をお試しください。");
      return;
    }
    state.quantities = {};
    renderEquip();
    gotoStep(2);
  } catch (e) {
    showError(translateError(e));
  } finally {
    btn.disabled = false;
    btn.textContent = "空き状況を確認する";
  }
}

// ---- 用具サイズUIの描画 ----
function renderEquip() {
  const container = document.getElementById("equip-container");
  const byCat = { ski: [], snowboard: [], boots: [] };
  state.availability.forEach((it) => { (byCat[it.category] || (byCat[it.category] = [])).push(it); });

  let html = "";
  ["ski", "snowboard", "boots"].forEach((cat) => {
    const list = byCat[cat];
    if (!list || list.length === 0) return;
    html += `<div class="equip-group"><div class="equip-group-title">${CATEGORY_LABEL[cat]}</div>`;
    list.forEach((it) => {
      const qty = state.quantities[it.equipment_item_id] || 0;
      html += `
        <div class="size-row">
          <div class="size-row-info">${it.size_label}<span class="size-row-remaining">残り${it.remaining}</span></div>
          <div class="stepper" data-id="${it.equipment_item_id}" data-max="${it.remaining}">
            <button type="button" class="dec">−</button>
            <span class="qty">${qty}</span>
            <button type="button" class="inc">＋</button>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;

  container.querySelectorAll(".stepper").forEach((stepper) => {
    const id = stepper.dataset.id;
    const max = parseInt(stepper.dataset.max, 10);
    stepper.querySelector(".inc").addEventListener("click", () => {
      const cur = state.quantities[id] || 0;
      if (cur < max) { state.quantities[id] = cur + 1; refreshStepper(stepper, id); }
    });
    stepper.querySelector(".dec").addEventListener("click", () => {
      const cur = state.quantities[id] || 0;
      if (cur > 0) { state.quantities[id] = cur - 1; refreshStepper(stepper, id); }
    });
    refreshStepper(stepper, id);
  });
}

function refreshStepper(stepper, id) {
  const max = parseInt(stepper.dataset.max, 10);
  const cur = state.quantities[id] || 0;
  stepper.querySelector(".qty").textContent = cur;
  stepper.querySelector(".dec").disabled = cur <= 0;
  stepper.querySelector(".inc").disabled = cur >= max;
}

// ---- 予約送信 ----
async function handleSubmit() {
  showError("");
  const name = document.getElementById("cust-name").value.trim();
  const phone = document.getElementById("cust-phone").value.trim();
  const email = document.getElementById("cust-email").value.trim();
  const notes = document.getElementById("cust-notes").value.trim();
  const partySize = parseInt(document.getElementById("party-size").value, 10);

  const items = Object.entries(state.quantities)
    .filter(([, q]) => q > 0)
    .map(([equipment_item_id, quantity]) => ({ equipment_item_id, quantity }));

  if (!name) { showError("お名前を入力してください。"); return; }
  if (!phone) { showError("電話番号を入力してください。"); return; }
  if (!partySize || partySize < 1) { showError("ご利用人数を入力してください。"); return; }
  if (items.length === 0) { showError("ご希望の用具・サイズを1つ以上選んでください。"); return; }

  const btn = document.getElementById("submit-reservation");
  btn.disabled = true;
  btn.textContent = "送信中...";
  try {
    const res = await createReservation({
      rentalDate: state.date, name, phone, email, partySize, items, notes,
    });
    showResult(res, { name, phone, email, partySize, items });
    gotoStep(3);
  } catch (e) {
    // 在庫が埋まった場合は空き状況を取り直して選び直してもらう
    if ((e.message || "").includes("OUT_OF_STOCK")) {
      try {
        state.availability = await fetchAvailability(state.date);
        state.quantities = {};
        renderEquip();
      } catch (_) { /* noop */ }
    }
    showError(translateError(e));
  } finally {
    btn.disabled = false;
    btn.textContent = "この内容で予約する";
  }
}

function showResult(res, input) {
  document.getElementById("result-code").textContent = res.reservation_code;

  const itemLines = input.items.map((it) => {
    const a = state.availability.find((x) => x.equipment_item_id === it.equipment_item_id);
    const label = a ? `${CATEGORY_LABEL[a.category]} ${a.size_label}` : "用具";
    return `${label} × ${it.quantity}`;
  }).join("、");

  document.getElementById("result-summary").innerHTML = `
    <div class="summary-row"><span class="k">利用日</span><span class="v">${state.date}</span></div>
    <div class="summary-row"><span class="k">お名前</span><span class="v">${input.name} 様</span></div>
    <div class="summary-row"><span class="k">人数</span><span class="v">${input.partySize}名</span></div>
    <div class="summary-row"><span class="k">用具</span><span class="v">${itemLines}</span></div>`;

  document.getElementById("email-note").textContent =
    input.email ? "ご入力のメールアドレスに確認メールをお送りしました。" :
    "予約番号は控えておいてください（確認・変更に必要です）。";
}

// ---- 初期化 ----
(function init() {
  const dateInput = document.getElementById("rental-date");
  dateInput.min = todayStr();
  dateInput.max = addDaysStr(todayStr(), 90); // business_settings.max_advance_days と合わせる
  // フィールドをタップしたらカレンダーを開く
  dateInput.addEventListener("click", () => { try { dateInput.showPicker(); } catch (e) {} });

  document.getElementById("to-step2").addEventListener("click", handleToStep2);
  document.getElementById("back-step1").addEventListener("click", () => { showError(""); gotoStep(1); });
  document.getElementById("submit-reservation").addEventListener("click", handleSubmit);
})();
</script>
</body>
</html>
